# devaipod configuration
# Generated by 'devaipod init'
#
# See https://github.com/cgwalters/devaipod#configuration for full documentation

# Dotfiles repository to clone into workspaces
[dotfiles]
url = "https://github.com/arewm/dotfiles"
# script = "install.sh"  # Optional: custom install script

# Trusted secrets - available to workspace and service-gator, but NOT the AI agent
# This keeps your tokens secure while enabling forge integration
[trusted]
secrets = [
    "GH_TOKEN=gh_token",
]

# Service-gator configuration for AI agent access to GitHub
[service-gator.gh.repos]
"arewm/*" = { read = true, create-draft = true }

# Environment variables for all containers (workspace + agent)
# Vertex AI auth is handled via gcloud ADC bind-mount in devcontainer.json
[env.vars]
GOOGLE_CLOUD_PROJECT = "itpc-gcp-pnd-pe-eng-claude"
