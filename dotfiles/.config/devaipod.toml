# devaipod configuration
# Generated by 'devaipod init'
#
# See https://github.com/cgwalters/devaipod#configuration for full documentation

# Source directories - maps name -> path, mounted at /mnt/<name> in containers.
# devaipod searches these for local clones when resolving repo URLs.
[sources]
src = "~/workspace/src"

# Dotfiles repository to clone into workspaces
[dotfiles]
url = "https://github.com/arewm/dotfiles"
# script = "install.sh"  # Optional: custom install script

# Trusted secrets - available to workspace and service-gator, but NOT the AI agent
# This keeps your tokens secure while enabling forge integration
[trusted]
secrets = [
    "GH_TOKEN=gh_token",
]
file_secrets = [
    "GOOGLE_APPLICATION_CREDENTIALS=GOOGLE_ADC",
]

# Service-gator configuration for AI agent access to GitHub
[service-gator.gh.repos]
"arewm/*" = { read = true, create-draft = true }
"sport-madness/*" = { read = true, create-draft = true }
"konflux-ci/*" = { read = true, create-draft = true }
"tektoncd/*" = { read = true }
"conforma/*" = { read = true }
"release-engineering/*" = { read = true }
"redhat-appstudio/*" = { read = true }
"slsa-framework/*" = { read = true }
"ohmyzsh/ohmyzsh" = { read = true }

# Additional git hosting providers for bare-URL normalization
[git]
extra_hosts = ["gitlab.cee.redhat.com"]

# Agent profiles — tried in order; first available binary wins.
[agent]
default = ["claude", "goose", "opencode"]

[agent.profiles.opencode]
command = ["opencode", "acp"]

[agent.profiles.claude]
command = ["claude-agent-acp"]

[agent.profiles.claude.env]
CLAUDE_CODE_USE_VERTEX = "1"
CLOUD_ML_REGION = "us-east5"
ANTHROPIC_VERTEX_PROJECT_ID = "itpc-gcp-pnd-pe-eng-claude"
ANTHROPIC_MODEL = "claude-opus-4-6"

[agent.profiles.goose]
command = ["goose", "acp"]

[agent.profiles.goose.env]
GOOSE_PROVIDER = "gcp_vertex_ai"
GOOSE_MODEL = "claude-opus-4-6"
GOOSE_MODE = "auto"
GCP_PROJECT_ID = "itpc-gcp-pnd-pe-eng-claude"
GCP_REGION = "us-east5"

# Environment variables for all containers (workspace + agent)
[env]
allowlist = ["GOOGLE_GENERATIVE_AI_API_KEY", "GOOGLE_API_KEY", "ANTHROPIC_API_KEY"]

[env.vars]
GOOGLE_CLOUD_PROJECT = "itpc-gcp-pnd-pe-eng-claude"
# Auto-allow all tool permissions (yolo mode) so the agent never prompts
OPENCODE_PERMISSION = '{"*":"allow"}'
